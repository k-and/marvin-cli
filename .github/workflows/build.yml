name: Build binaries

on:
  push:
    tags:
      - v*

  # Allow running from Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: getVersion
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Build
        run: ./build-all

      - name: Create Release Text
        run: awk '/^## \[/{if(found)exit;found=1;next} /^\[.*\]:/{if(found)exit} found' CHANGELOG.md > RELEASE.md

      - name: Rename binaries for release
        run: |
          mv ./out/linux/marvin-cli ./out/marvin-cli-linux
          mv ./out/macos/marvin-cli ./out/marvin-cli-macos
          mv ./out/macos-arm/marvin-cli ./out/marvin-cli-macos-arm
          mv ./out/windows/marvin-cli.exe ./out/marvin-cli-win.exe

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.getVersion.outputs.VERSION }}
          body_path: RELEASE.md
          draft: false
          prerelease: false
          files: |
            ./out/marvin-cli-linux
            ./out/marvin-cli-macos
            ./out/marvin-cli-macos-arm
            ./out/marvin-cli-win.exe
        env:
          GITHUB_TOKEN: ${{ github.token }}
